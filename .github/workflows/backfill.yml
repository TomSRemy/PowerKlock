name: Backfill Historical Data

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2015-01-01'
      end_date:
        description: 'End date (YYYY-MM-DD) — leave blank for today'
        required: false
        default: ''
      zones:
        description: 'Zones (comma-separated) — recommended: FR,DE_LU,ES,BE,NL'
        required: false
        default: 'FR,DE_LU,ES,BE,NL'
      with_generation:
        description: 'Include wind/solar generation (A75) — run prices first'
        type: boolean
        default: false
      delay:
        description: 'Delay between requests in seconds (0.4 recommended)'
        required: false
        default: '0.4'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests==2.33.1

      - name: Compute end date
        id: dates
        run: |
          if [ -z "${{ inputs.end_date }}" ]; then
            echo "end=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          else
            echo "end=${{ inputs.end_date }}" >> $GITHUB_OUTPUT
          fi

      - name: Run backfill
        run: |
          ARGS="--start ${{ inputs.start_date }} --end ${{ steps.dates.outputs.end }}"
          ARGS="$ARGS --delay ${{ inputs.delay }}"
          if [ -n "${{ inputs.zones }}" ]; then
            ARGS="$ARGS --zones ${{ inputs.zones }}"
          fi
          if [ "${{ inputs.with_generation }}" = "true" ]; then
            ARGS="$ARGS --with-generation"
          fi
          echo "Running: python scripts/backfill.py $ARGS"
          python scripts/backfill.py $ARGS
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}

      - name: Commit and push history data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/history/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            MSG="backfill: ${{ inputs.start_date }} to ${{ steps.dates.outputs.end }} zones=${{ inputs.zones }}"
            if [ "${{ inputs.with_generation }}" = "true" ]; then
              MSG="$MSG +generation"
            fi
            git commit -m "$MSG"
            git push
          fi
