<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POWER.KLOCK VOLLEY</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png">
<link rel="shortcut icon" href="../assets/favicon.ico">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
  :root{--mint:#14D3A9;--coral:#ED6965;--canary:#FFFD82;--ink:#011627;--bg:#070b10;--tx2:#B8C9D9;--tx3:#7A93AB;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:radial-gradient(1200px 600px at 50% -10%,#0e1925 0%,transparent 60%),var(--bg);color:#fff;font-family:'Outfit',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:18px;overflow:hidden}
  .wrap{width:min(960px,100%)}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;letter-spacing:.04em}
  .brand .wm{font-weight:700;font-size:18px}
  .brand .wm b{color:var(--canary)}
  .tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:.18em;text-transform:uppercase;border:1px solid #1b2735;border-radius:999px;padding:3px 9px}
  .stage{position:relative;border:1px solid #182433;border-radius:16px;overflow:hidden;box-shadow:0 30px 80px -30px #000,inset 0 0 0 1px #0c141d;background:var(--ink)}
  canvas{display:block;width:100%;height:auto}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3);flex-wrap:wrap;gap:8px}
  .keycap{display:inline-block;border:1px solid #243343;border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--tx2);background:#0d1620;margin:0 1px;font-size:10px}
  .p1{color:var(--mint)}.p2{color:var(--coral)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <img src="../assets/logo-header.png" alt="PowerKlock" style="height:28px;display:block">
      <span class="wm" style="font-size:13px;color:var(--tx3);font-weight:500;letter-spacing:.2em;text-transform:uppercase">Volley</span>
    </div>
    <span class="tag">arcade</span>
  </div>
  <div class="stage"><canvas id="game" width="960" height="540"></canvas></div>
  <div class="foot">
    <span><b style="color:var(--tx2)">Solo</b> &nbsp;<span class="keycap">←</span><span class="keycap">→</span> bouger &nbsp;<span class="keycap">↑</span> ou <span class="keycap">Espace</span> saut</span>
    <span><span class="keycap">M</span> son &nbsp;·&nbsp; <span class="keycap">R</span> rejouer &nbsp;·&nbsp; attrape les bonus en sautant</span>
    <span><b style="color:var(--tx2)">2 joueurs</b> &nbsp;<span class="p1">FR</span> <span class="keycap">A</span><span class="keycap">D</span><span class="keycap">W</span> &nbsp;<span class="p2">DE</span> <span class="keycap">←</span><span class="keycap">→</span><span class="keycap">↑</span> ou <span class="keycap">Espace</span></span>
  </div>
</div>
<script>
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
const W=960,H=540,DPR=2;
cv.width=W*DPR;cv.height=H*DPR;ctx.scale(DPR,DPR);
const MINT='#14D3A9',CORAL='#ED6965',CANARY='#FFFD82',INK='#011627',TX2='#B8C9D9',TX3='#7A93AB';

const GROUND=H-92,NET_W=10,NODE_R=9,NET_TOP=GROUND-128,NET_X=W/2;
const R=58,BR=14,GRAV=0.62,GRAV_BALL=0.27,MOVE=7.2,JUMP=15,MAXB=24,WIN_SCORE=7;

const ITEMS=[{id:'smash',col:CORAL,name:'SMASH'},{id:'grow',col:MINT,name:'GROW'},{id:'dash',col:CANARY,name:'DASH'}];
const itemById=id=>ITEMS.find(i=>i.id===id);

let state='title',mode='solo',aiLevel='normal',lastMode='solo',lastLevel='normal';
let scoreL=0,scoreR=0,rally=0,maxRally=0,serveTo='L',countdown=0,winner=null,shake=0,t=0;
const AI_CFG={
  easy:  {interval:11,error:78,jumpChance:0.55,speedMul:0.80,getsItems:false,label:'FACILE'},
  normal:{interval:4, error:36,jumpChance:0.96,speedMul:1.00,getsItems:true, label:'NORMALE'},
  hard:  {interval:2, error:13,jumpChance:0.99,speedMul:1.10,getsItems:true, label:'DIFFICILE'}
};
let aiCfg=AI_CFG.normal;

const keys={};
const PERFECT_NEEDED=6;
const ONOMAT=['POW','BAM','PAF','TCHAK','WHAM','BOUM','ZAP','PAN','VLAN','TAC'];
let cine=null,rallyTouches=0,lastWasPerfect=false,lastToucher=null;
const players={
  L:{x:W*0.27,y:GROUND,vx:0,vy:0,dir:1,col:MINT,zone:'FR',ai:false,hold:null,rmul:1,growT:0,dashT:0,perfect:0,special:false,kLeft:'a',kRight:'d',kJump:'w',kJump2:null},
  R:{x:W*0.73,y:GROUND,vx:0,vy:0,dir:-1,col:CORAL,zone:'DE',ai:true,hold:null,rmul:1,growT:0,dashT:0,perfect:0,special:false,kLeft:'arrowleft',kRight:'arrowright',kJump:'arrowup',kJump2:null}
};
const ball={x:W*0.27,y:GROUND-260,vx:0,vy:0,spin:0,ring:0,alive:false,fx:null,hitCd:0};
let trail=[],particles=[],surgeFlash=null,beam=null,whiteFlash=0,popups=[],shock=null,crater=null,crack=null,aiTarget=W*0.73,aiTimer=0;
let item=null,itemTimer=150;

// ── audio ──
let actx=null,muted=false;
function audio(){if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function beep(f,d=0.07,type='square',v=0.16){if(muted||!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d);}
const sHit=v=>beep(300+Math.min(v,18)*24,0.06,'square',0.18);
const sWall=()=>beep(180,0.05,'triangle',0.12);
const sNet=()=>beep(130,0.06,'sawtooth',0.12);
const sScore=()=>{beep(420,0.10,'square',0.18);setTimeout(()=>beep(240,0.16,'square',0.18),90);};
const sWin=()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.14,'square',0.2),i*110));
const sSurge=()=>{beep(900,0.05,'square',0.22);setTimeout(()=>beep(1500,0.12,'sawtooth',0.2),45);setTimeout(()=>beep(300,0.14,'square',0.18),60);};
const sItem=()=>{beep(700,0.05,'square',0.16);setTimeout(()=>beep(1050,0.08,'square',0.16),55);};
const sPerfect=()=>{beep(1200,0.05,'square',0.16);setTimeout(()=>beep(1700,0.07,'square',0.14),50);};
const sReady=()=>[660,880,1320].forEach((f,i)=>setTimeout(()=>beep(f,0.1,'square',0.18),i*70));
const sBlast=()=>{if(muted||!actx)return;[500,700,950,1300,1700].forEach((f,i)=>setTimeout(()=>beep(f,0.07,'sawtooth',0.16),i*38));setTimeout(()=>beep(110,0.35,'sawtooth',0.24),200);};
function sKame(){if(muted||!actx)return;const o=actx.createOscillator(),v=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';v.type='sine';v.frequency.value=6;const vg=actx.createGain();vg.gain.value=18;v.connect(vg);vg.connect(o.frequency);o.frequency.setValueAtTime(180,actx.currentTime);o.frequency.linearRampToValueAtTime(420,actx.currentTime+1.0);g.gain.setValueAtTime(0.0001,actx.currentTime);g.gain.linearRampToValueAtTime(0.16,actx.currentTime+0.15);g.gain.setValueAtTime(0.16,actx.currentTime+0.9);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+1.15);o.connect(g);g.connect(actx.destination);o.start();v.start();o.stop(actx.currentTime+1.2);v.stop(actx.currentTime+1.2);}

// ── helpers ──
function spark(x,y,col,n=10,spd=5,big){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*spd+1;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,col,r:(Math.random()*3+1.5)*(big?2:1)});}}
function wisp(x,y,col){particles.push({x:x+(Math.random()-0.5)*60,y,vx:(Math.random()-0.5)*0.6,vy:-(Math.random()*2.4+1.2),life:1,col,r:Math.random()*2.4+1.4,rise:1});}
function updateParticles(){for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=p.rise?-0.02:0.18;p.life-=p.rise?0.022:0.03;}particles=particles.filter(p=>p.life>0);}
function popup(x,y,txt,col,comic){popups.push({x,y,txt,col,life:1,comic:!!comic,rot:(Math.random()-0.5)*0.4,sz:comic?(20+Math.random()*10):18});}
function comicPop(x,y){popup(x,y,ONOMAT[Math.floor(Math.random()*ONOMAT.length)]+'!',Math.random()<0.5?CANARY:'#fff',true);}
function shade(hex,amt){const n=parseInt(hex.slice(1),16);let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));return`rgb(${r},${g},${b})`;}
function glow(c,b){ctx.shadowColor=c;ctx.shadowBlur=b;}
function noGlow(){ctx.shadowBlur=0;}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function bolt(x1,y1,x2,y2,col,wd){const seg=6,dx=(x2-x1)/seg,dy=(y2-y1)/seg;ctx.strokeStyle=col;ctx.lineWidth=wd;glow(col,16);ctx.beginPath();ctx.moveTo(x1,y1);for(let i=1;i<seg;i++)ctx.lineTo(x1+dx*i+(Math.random()-0.5)*16,y1+dy*i+(Math.random()-0.5)*16);ctx.lineTo(x2,y2);ctx.stroke();noGlow();}
function fxCol(){if(ball.fx?.type==='blast')return ball.fx.col;if(ball.fx?.type==='smash')return CORAL;if(ball.fx?.type==='float')return MINT;if(ball.fx?.type==='curve')return CANARY;return CANARY;}

// ── flow ──
function startGame(m,level){
  mode=m;
  if(m==='solo'){players.L.kLeft='arrowleft';players.L.kRight='arrowright';players.L.kJump='arrowup';players.L.kJump2=' ';players.R.ai=true;if(level){aiLevel=level;aiCfg=AI_CFG[level];}}
  else{players.L.kLeft='a';players.L.kRight='d';players.L.kJump='w';players.L.kJump2=null;players.R.kLeft='arrowleft';players.R.kRight='arrowright';players.R.kJump='arrowup';players.R.kJump2=' ';players.R.ai=false;}
  lastMode=m;lastLevel=aiLevel;
  scoreL=scoreR=0;maxRally=0;serveTo='L';players.L.hold=players.R.hold=null;itemTimer=150;serve();
}
function serve(){const s=players[serveTo];ball.x=s.x;ball.y=GROUND-260;ball.vx=0;ball.vy=0;ball.alive=false;ball.fx=null;ball.hitCd=0;for(const k of['L','R']){const p=players[k];p.hold=null;p.growT=0;p.dashT=0;p.rmul=1;}players.L.x=W*0.27;players.R.x=W*0.73;players.L.y=players.R.y=GROUND;players.L.vy=players.R.vy=0;trail=[];rally=0;countdown=85;item=null;beam=null;cine=null;shock=null;crater=null;crack=null;rallyTouches=0;lastWasPerfect=false;lastToucher=null;state='serve';}
function launch(){ball.alive=true;ball.vy=1;state='play';beep(660,0.05,'square',0.12);}
function scorePoint(side){const loser=side==='L'?'R':'L';players[loser].perfect=0;players[loser].special=false;if(side==='L')scoreL++;else scoreR++;serveTo=side==='L'?'R':'L';maxRally=Math.max(maxRally,rally);shake=14;sScore();spark(ball.x,GROUND,side==='L'?MINT:CORAL,26,7);if(scoreL>=WIN_SCORE||scoreR>=WIN_SCORE){winner=scoreL>scoreR?'L':'R';state='over';setTimeout(sWin,120);}else serve();}
function spawnItem(){
  const type=ITEMS[Math.floor(Math.random()*ITEMS.length)];
  const diff=scoreL-scoreR; // >0 : L mène
  // côté du joueur en retard, biais léger
  let cx=100+Math.random()*(W-200);
  if(diff>0)cx=NET_X+40+Math.random()*(W*0.5-80);      // R mené -> côté droit
  else if(diff<0)cx=80+Math.random()*(W*0.5-40);        // L mené -> côté gauche
  item={x:cx,y:200+Math.random()*100,type,life:520,bob:Math.random()*7};beep(520,0.04,'triangle',0.12);
}
// délai d'apparition réduit pour le joueur mené (rattrapage léger)
function itemDelay(){const gap=Math.abs(scoreL-scoreR);return Math.max(150,(300+Math.random()*220)-gap*45);}

// ── AI ──
function predictX(){if(!ball.alive)return W*0.73;let x=ball.x,y=ball.y,vx=ball.vx,vy=ball.vy;for(let i=0;i<320;i++){vy+=GRAV_BALL;x+=vx;y+=vy;if(x<BR){x=BR;vx=-vx*0.9;}if(x>W-BR){x=W-BR;vx=-vx*0.9;}if(y>=GROUND-R*0.6)break;}return x;}
function aiControl(p,mMul,jMul){
  aiTimer--;
  const home=W*0.73;
  if(aiTimer<=0){
    let tgt=home;
    if(ball.alive){
      const coming=ball.x>NET_X||ball.vx>0.3;
      if(coming){const px=predictX();tgt=px>NET_X?px+(Math.random()-0.5)*aiCfg.error:home;}
    }
    if(aiCfg.getsItems&&item&&item.x>NET_X+10&&ball.alive&&ball.x<NET_X-40)tgt=item.x;
    aiTarget=tgt;aiTimer=aiCfg.interval;
  }
  const target=Math.max(NET_X+NET_W/2+R*p.rmul+4,Math.min(W-R*p.rmul-4,aiTarget));
  let mv=0;if(target<p.x-12)mv=-1;else if(target>p.x+12)mv=1;
  p.vx=mv*MOVE*aiCfg.speedMul*mMul;
  const closeBall=Math.abs(ball.x-p.x)<R*1.25,reachBall=ball.y>NET_TOP-20&&ball.y<p.y-R*0.35;
  const closeItem=aiCfg.getsItems&&item&&Math.abs(item.x-p.x)<R*0.9&&item.y>p.y-R-150;
  if(((closeBall&&reachBall&&ball.vy>=-2)||closeItem)&&p.y>=GROUND-0.5&&Math.random()<aiCfg.jumpChance)p.vy=-JUMP*jMul;
}

// ── physics ──
function step(){
  for(const k of['L','R']){
    const p=players[k];
    if(p.growT>0)p.growT--;if(p.dashT>0)p.dashT--;
    p.rmul=p.growT>0?1.4:1;
    const mMul=p.dashT>0?1.5:1,jMul=p.dashT>0?1.12:1,PR=R*p.rmul;
    if(p.ai&&state==='play')aiControl(p,mMul,jMul);
    else{let mv=0;if(keys[p.kLeft])mv-=1;if(keys[p.kRight])mv+=1;p.vx=mv*MOVE*mMul;const jp=keys[p.kJump]||(p.kJump2&&keys[p.kJump2]);if(jp&&p.y>=GROUND-0.5)p.vy=-JUMP*jMul;}
    p.x+=p.vx;p.y+=p.vy;p.vy+=GRAV;
    if(p.y>GROUND){p.y=GROUND;p.vy=0;}
    if(k==='L')p.x=Math.max(PR,Math.min(NET_X-NET_W/2-PR,p.x));else p.x=Math.max(NET_X+NET_W/2+PR,Math.min(W-PR,p.x));
    p.dir=ball.x<p.x?-1:1;
  }
  if(state==='play'){if(!item){itemTimer--;if(itemTimer<=0)spawnItem();}else{
    item.life--;const iy=item.y+Math.sin(t*0.08+item.bob)*6;
    for(const k of['L','R']){const p=players[k];if(Math.hypot(item.x-p.x,iy-p.y)<R*p.rmul+16){const id=item.type.id;if(id==='smash')p.hold='smash';else if(id==='grow')p.growT=420;else if(id==='dash')p.dashT=420;spark(item.x,iy,item.type.col,18,5);sItem();item=null;itemTimer=itemDelay();break;}}
    if(item&&item.life<=0){item=null;itemTimer=itemDelay();}
  }}
  if(!ball.alive){ball.x=players[serveTo].x;ball.ring+=0.05;return;}
  if(ball.hitCd>0)ball.hitCd--;
  let g=GRAV_BALL;
  if(ball.fx){if(ball.fx.type==='float')g=0.12;if(ball.fx.type==='curve')ball.vx+=ball.fx.dir;if(ball.fx.type==='blast')g=ball.fx.gB||0.16;ball.fx.timer--;if(ball.fx.timer<=0)ball.fx=null;}
  ball.vy+=g;
  if(!(ball.fx&&ball.fx.uncapped)){ball.vx=Math.max(-MAXB,Math.min(MAXB,ball.vx));ball.vy=Math.max(-MAXB,Math.min(MAXB,ball.vy));}
  else{const C=MAXB*3;ball.vx=Math.max(-C,Math.min(C,ball.vx));ball.vy=Math.max(-C,Math.min(C,ball.vy));}
  ball.x+=ball.vx;ball.y+=ball.vy;ball.spin+=ball.vx*0.02;ball.ring+=0.18+Math.abs(ball.vx)*0.01;
  trail.push({x:ball.x,y:ball.y,c:fxCol()});if(trail.length>16)trail.shift();
  if(ball.x<BR){ball.x=BR;ball.vx=Math.abs(ball.vx)*0.92;sWall();spark(ball.x,ball.y,CANARY,5,3);}
  if(ball.x>W-BR){ball.x=W-BR;ball.vx=-Math.abs(ball.vx)*0.92;sWall();spark(ball.x,ball.y,CANARY,5,3);}
  if(ball.y<BR){ball.y=BR;ball.vy=Math.abs(ball.vy)*0.9;}
  // net: node (top) + pole (below) — le blast d'énergie traverse
  if(ball.fx?.type!=='blast'){
  const nodeY=NET_TOP+8;
  {const dx=ball.x-NET_X,dy=ball.y-nodeY,d=Math.hypot(dx,dy)||1;if(d<BR+NODE_R){const nx=dx/d,ny=dy/d,dot=ball.vx*nx+ball.vy*ny;if(dot<0){ball.vx-=2*dot*nx;ball.vy-=2*dot*ny;}ball.x=NET_X+nx*(BR+NODE_R);ball.y=nodeY+ny*(BR+NODE_R);sNet();}}
  if(ball.y>nodeY&&Math.abs(ball.x-NET_X)<NET_W/2+BR){if(ball.x<NET_X){ball.x=NET_X-NET_W/2-BR;ball.vx=-Math.abs(ball.vx)*0.9;}else{ball.x=NET_X+NET_W/2+BR;ball.vx=Math.abs(ball.vx)*0.9;}sNet();}
  }
  // slimes
  for(const k of['L','R']){
    const p=players[k];const PR=R*p.rmul,dx=ball.x-p.x,dy=ball.y-p.y,d=Math.hypot(dx,dy)||1;
    if(d<PR+BR&&dy<6&&ball.hitCd<=0){
      const nx=dx/d,ny=dy/d;
      const incoming=Math.hypot(ball.vx,ball.vy);
      ball.x=p.x+nx*(PR+BR);ball.y=p.y+ny*(PR+BR);
      const toOpp=(k==='L')?1:-1;
      let speed=Math.min(Math.max(incoming,11),16);
      rally++;ball.hitCd=6;
      const prevTouches=rallyTouches;rallyTouches++;
      const fromOpponent=lastToucher&&lastToucher!==k;
      lastToucher=k;
      if(p.special){
        // ─ déclenche la séquence cinématique ─
        p.special=false;
        cine={striker:k,col:p.col,t:0,dur:110,charge:0,released:false};
        ball.vx=0;ball.vy=0;
        sReady();lastWasPerfect=false;
        return;
      }else if(p.hold==='smash'){
        p.hold=null;ball.vx=toOpp*MAXB*0.95;ball.vy=-3;ball.fx={type:'smash',timer:26};
        surgeFlash={x1:p.x,y1:p.y-PR,x2:ball.x,y2:ball.y,life:1,col:p.col};sSurge();shake=18;spark(ball.x,ball.y,CANARY,24,9);spark(ball.x,ball.y,CORAL,12,6);
        popup(ball.x,ball.y-30,'SMASH!',CORAL,true);
        lastWasPerfect=false;
      }else{
        ball.vx=nx*speed+p.vx*0.4;ball.vy=ny*speed-1.5;
        sHit(speed);spark(ball.x,ball.y,p.col,12,5);shake=Math.min(7,3+speed*0.12);
        comicPop(ball.x,ball.y-28);
        // retour parfait (clutch) : balle rapide renvoyée au sol, hors service, pas deux fois de suite
        const clutch=incoming>13 && p.y>GROUND-20;
        const canPerfect=!lastWasPerfect && prevTouches>=1 && fromOpponent;
        if(clutch&&canPerfect){
          p.perfect++;lastWasPerfect=true;sPerfect();popup(ball.x,ball.y-48,'PERFECT',CANARY);spark(ball.x,ball.y,CANARY,12,4);
          if(p.perfect>=PERFECT_NEEDED){p.perfect=0;p.special=true;sReady();popup(p.x,p.y-PR-26,'SPECIAL READY',p.col);}
        }else{
          lastWasPerfect=false;
        }
      }
    }
  }
  if(ball.y+BR>=GROUND){
    ball.y=GROUND-BR;
    if(ball.fx&&ball.fx.type==='blast'){
      shock={x:ball.x,y:GROUND,r:14,life:1,col:ball.fx.col};
      crater={x:ball.x,y:GROUND,life:1,col:ball.fx.col};

function drawAura(p,PR){
  const charging=cine&&players[cine.striker]===p&&!cine.released;
  const amp=charging?(0.7+cine.charge*0.7):0.55;
  const baseY=p.y, FW=PR*1.5, H0=PR*(3.1+amp*2.0), N=46;
  ctx.save();ctx.globalCompositeOperation='lighter';
  // lueur de base
  const bgl=ctx.createRadialGradient(p.x,baseY,2,p.x,baseY,FW*1.3);bgl.addColorStop(0,p.col);bgl.addColorStop(1,'transparent');ctx.globalAlpha=0.25;ctx.fillStyle=bgl;ctx.beginPath();ctx.ellipse(p.x,baseY,FW*1.2,PR*0.6,0,0,7);ctx.fill();ctx.globalAlpha=1;
  // champ de flamme : pointes hautes + vacillement nerveux
  const sway=Math.sin(t*0.12)*PR*0.05;
  const edge=(nx,phase)=>{
    const env=Math.pow(Math.max(0,1-nx*nx),0.5);                   // enveloppe plus pleine -> pointes hautes
    const lick=Math.sin(nx*9+t*0.6+phase)*0.55+Math.sin(nx*19-t*0.9+phase)*0.3+Math.sin(nx*4+t*0.35+phase)*0.6;
    const jitter=Math.sin(nx*31+t*1.6+phase)*0.12;                 // tremblement rapide (nerveux)
    const spike=Math.pow(Math.abs(Math.sin(nx*5+t*0.3+phase)),3)*0.45; // pointes acérées
    return Math.max(0,env*(1+lick*0.18+jitter)+spike*env);
  };
  const flame=(width,height,grad,alpha)=>{
    ctx.globalAlpha=alpha;ctx.fillStyle=grad;ctx.beginPath();
    ctx.moveTo(p.x-width,baseY);
    for(let i=0;i<=N;i++){const nx=-1+2*i/N;const ex=p.x+nx*width+sway;const ey=baseY-Math.max(0,edge(nx,0))*height;i===0?ctx.lineTo(ex,ey):ctx.lineTo(ex,ey);}
    ctx.lineTo(p.x+width,baseY);ctx.closePath();ctx.fill();
  };
  // couche externe (couleur du slime -> canary -> transparent)
  const g1=ctx.createLinearGradient(p.x,baseY,p.x,baseY-H0);g1.addColorStop(0,p.col);g1.addColorStop(0.5,'rgba(255,253,130,0.45)');g1.addColorStop(0.85,'rgba(255,253,130,0.12)');g1.addColorStop(1,'transparent');
  flame(FW,H0,g1,0.55);
  // couche médiane (plus resserrée, plus vive)
  const g2=ctx.createLinearGradient(p.x,baseY,p.x,baseY-H0*0.82);g2.addColorStop(0,p.col);g2.addColorStop(0.6,'rgba(255,253,130,0.5)');g2.addColorStop(1,'transparent');
  flame(FW*0.66,H0*0.82,g2,0.5);
  // cœur blanc (étroit, haut)
  const g3=ctx.createLinearGradient(p.x,baseY,p.x,baseY-H0*0.6);g3.addColorStop(0,'#fff');g3.addColorStop(0.55,p.col);g3.addColorStop(1,'transparent');
  flame(FW*0.34,H0*0.6,g3,0.55);
  // étincelles montantes
  ctx.fillStyle=CANARY;
  for(let i=0;i<14;i++){const ph=((t*0.045+i*0.27)%1);const nx=(i/13)*2-1;const bx=p.x+nx*FW*0.6;const yy=baseY-PR*0.1-ph*H0*0.95;const sz=(1-ph)*3+0.8;ctx.globalAlpha=(1-ph)*0.9;ctx.beginPath();ctx.arc(bx+Math.sin(t*0.1+i)*5,yy,sz,0,7);ctx.fill();}
  ctx.globalAlpha=1;ctx.restore();
}

function moveSlow(o){
  const f=0.4;
  if(o.ai){let mv=(ball.x<o.x?-1:1);o.vx=mv*MOVE*0.5*f;}
  else{let mv=0;if(keys[o.kLeft])mv-=1;if(keys[o.kRight])mv+=1;o.vx=mv*MOVE*f;}
  o.x+=o.vx;o.vy+=GRAV*f;o.y+=o.vy*f;if(o.y>GROUND){o.y=GROUND;o.vy=0;}
  const PR=R*o.rmul;if(o===players.L)o.x=Math.max(PR,Math.min(NET_X-NET_W/2-PR,o.x));else o.x=Math.max(NET_X+NET_W/2+PR,Math.min(W-PR,o.x));

function cineUpdate(){
  cine.t++;
  if(cine.t===1)sKame();
  const p=players[cine.striker],opp=players[cine.striker==='L'?'R':'L'],PR=R*p.rmul,toOpp=cine.striker==='L'?1:-1;
  const prog=Math.min(1,cine.t/cine.dur);
  const peakY=GROUND-160;
  p.y=GROUND+(peakY-GROUND)*Math.min(1,prog*1.8);p.vy=0;
  p.dir=toOpp;
  if(!cine.released){ball.x=p.x+toOpp*PR*0.4;ball.y=p.y-PR*0.45-Math.sin(prog*Math.PI)*8;}
  ball.ring+=0.32;
  cine.charge=prog;
  if(!cine.released)moveSlow(opp);
  if(cine.t%1===0){wisp(p.x,p.y,Math.random()<0.5?cine.col:CANARY);}
  if(!cine.released&&cine.t>=cine.dur){
    cine.released=true;
    ball.x=p.x+toOpp*(PR+BR);ball.y=p.y-PR*0.3;
    // visée dynamique : prend l'adversaire à contre-pied
    const oppMinX=NET_X+NET_W/2+BR+10, oppMaxX=W-BR-10;
    const lo=(toOpp>0)?oppMinX:BR+10, hi=(toOpp>0)?oppMaxX:NET_X-NET_W/2-BR-10;
    const oppCenter=(lo+hi)/2;
    let targetX=(opp.x>oppCenter)?(lo+(hi-lo)*0.16):(lo+(hi-lo)*0.84);
    targetX=Math.max(lo,Math.min(hi,targetX));
    const targetY=GROUND-BR;
    const apexY=NET_TOP-45;                                    // sommet juste au-dessus du filet (arc court)
    const gB=0.34;
    const rise=Math.max(20,ball.y-apexY);
    let vy0=-Math.sqrt(2*gB*rise);
    const tUp=Math.sqrt(2*rise/gB), tDown=Math.sqrt(2*Math.max(20,targetY-apexY)/gB), tot=tUp+tDown;
    let vx0=(targetX-ball.x)/tot;
    // SPIKE : même trajectoire mais traversée bien plus vite + chute plus violente (hors plafond)
    const S=2.2;
    ball.vx=vx0*S; ball.vy=vy0*S;
    ball.fx={type:'blast',timer:Math.ceil(tot/S)+24,col:cine.col,gB:gB*S*S,target:targetX,uncapped:true};
    beam={x1:p.x,y1:p.y-PR,x2:targetX,y2:targetY,life:1,col:cine.col};
    whiteFlash=1;shake=60;sBlast();shock={x:p.x,y:p.y-PR*0.5,r:10,life:1,col:cine.col};
    // fissure d'écran (Tsubasa) : branches qui partent du point de tir
    const cx0=p.x,cy0=p.y-PR*0.5,branches=[];
    for(let b=0;b<7;b++){const ang=(b/7)*Math.PI*2+Math.random()*0.4;let x=cx0,y=cy0;const segs=[];for(let s=0;s<6;s++){const len=40+Math.random()*70;x+=Math.cos(ang)*len+(Math.random()-0.5)*40;y+=Math.sin(ang)*len+(Math.random()-0.5)*40;segs.push([x,y]);}branches.push(segs);}
    crack={x:cx0,y:cy0,branches,life:1,col:cine.col};
    spark(ball.x,ball.y,cine.col,52,14,true);spark(ball.x,ball.y,CANARY,32,12,true);
    popup(p.x,p.y-PR-30,'KLOCK BLAST',cine.col,true);
  }
  if(cine.t>=cine.dur+3)cine=null;
}

function frame(){

  else if(state==='serve'){countdown--;ball.x=players[serveTo].x;ball.ring+=0.05;if(countdown<=0)launch();step();}
  updateParticles();
  if(surgeFlash){surgeFlash.life-=0.12;if(surgeFlash.life<=0)surgeFlash=null;}
  if(beam){beam.life-=0.06;if(beam.life<=0)beam=null;}
  if(shock){shock.r+=22;shock.life-=0.05;if(shock.life<=0)shock=null;}
  if(crater){crater.life-=0.012;if(crater.life<=0)crater=null;}
  if(crack){crack.life-=0.045;if(crack.life<=0)crack=null;}
  if(whiteFlash>0)whiteFlash-=0.08;
  for(const pp of popups){pp.y-=0.7;pp.life-=0.018;}popups=popups.filter(pp=>pp.life>0);
  if(shake>0)shake*=0.86;
  ctx.save();
  if(shake>0.4)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  if(cine){const p=players[cine.striker];const z=1.25+cine.charge*0.35;const fx=W/2+(p.x-W/2)*0.5;ctx.translate(W/2,H*0.5);ctx.scale(z,z);ctx.translate(-fx,-H*0.5);}
  drawBackground();
  // cratère d'impact au sol
  if(crater){const a=Math.max(0,crater.life);ctx.save();ctx.globalAlpha=a;
    ctx.fillStyle='#05090d';ctx.beginPath();ctx.ellipse(crater.x,GROUND+3,46*(2-a),11*(2-a),0,0,7);ctx.fill();
    ctx.strokeStyle=crater.col;ctx.lineWidth=2;ctx.globalAlpha=a*0.7;ctx.beginPath();ctx.ellipse(crater.x,GROUND+3,46*(2-a),11*(2-a),0,0,7);ctx.stroke();
    // fissures
    ctx.strokeStyle=crater.col;ctx.lineWidth=2;ctx.globalAlpha=a*0.6;for(let i=0;i<6;i++){const ang=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(crater.x,GROUND);ctx.lineTo(crater.x+Math.cos(ang)*40*(2-a),GROUND+Math.sin(ang)*10*(2-a));ctx.stroke();}
    ctx.restore();ctx.globalAlpha=1;}
  if(cine&&!cine.released){
    ctx.fillStyle='#000';ctx.globalAlpha=0.66*cine.charge;ctx.fillRect(-400,-400,W+800,H+800);ctx.globalAlpha=1;
    // lignes de vitesse manga (Tsubasa) convergent vers le frappeur
    const p=players[cine.striker],PR=R*p.rmul;ctx.save();ctx.globalCompositeOperation='lighter';ctx.strokeStyle=p.col;
    const NL=44;for(let i=0;i<NL;i++){const ang=(i/NL)*Math.PI*2+i*0.3;const r0=W*0.7,r1=PR*1.6+ (1-cine.charge)*W*0.2;const x0=p.x+Math.cos(ang)*r0,y0=(p.y-PR*0.5)+Math.sin(ang)*r0;const x1=p.x+Math.cos(ang)*r1,y1=(p.y-PR*0.5)+Math.sin(ang)*r1;ctx.globalAlpha=0.12+0.18*cine.charge;ctx.lineWidth=1+ (i%3===0?1.5:0);ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();}
    ctx.restore();ctx.globalAlpha=1;
  }
  drawItem();drawSlime(players.L);drawSlime(players.R);
  if(surgeFlash){ctx.globalAlpha=surgeFlash.life;bolt(surgeFlash.x1,surgeFlash.y1,surgeFlash.x2,surgeFlash.y2,surgeFlash.col,4);bolt(surgeFlash.x1,surgeFlash.y1,surgeFlash.x2,surgeFlash.y2,CANARY,2);ctx.globalAlpha=1;}
  // KLOCK BLAST beam (layered)
  if(beam){ctx.globalAlpha=Math.max(0,beam.life);ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle=beam.col;ctx.lineWidth=16*beam.life;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(beam.x1,beam.y1);ctx.lineTo(beam.x2,beam.y2);ctx.stroke();
    bolt(beam.x1,beam.y1,beam.x2,beam.y2,CANARY,4);ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(beam.x1,beam.y1);ctx.lineTo(beam.x2,beam.y2);ctx.stroke();
    ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;}
  if(shock){ctx.globalAlpha=Math.max(0,shock.life);ctx.strokeStyle=shock.col;ctx.lineWidth=6*shock.life;ctx.beginPath();ctx.arc(shock.x,shock.y,shock.r,0,7);ctx.stroke();ctx.strokeStyle='#fff';ctx.lineWidth=2*shock.life;ctx.beginPath();ctx.arc(shock.x,shock.y,shock.r*0.7,0,7);ctx.stroke();ctx.globalAlpha=1;}
  drawBall();
  // particles (additive)
  ctx.globalCompositeOperation='lighter';
  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  ctx.restore();
  drawVignette();
  if(cine){const bar=Math.min(54,cine.t*4);ctx.fillStyle='#000';ctx.fillRect(0,0,W,bar);ctx.fillRect(0,H-bar,W,bar);
    if(!cine.released){const wp=players[cine.striker];const txt='KAMÉHAMÉHA'+'A'.repeat(Math.floor(cine.charge*6));const sc=0.7+cine.charge*0.6;
      ctx.save();ctx.translate(W/2,118);ctx.scale(sc,sc);ctx.textAlign='center';
      ctx.font='800 30px "Outfit",sans-serif';ctx.lineWidth=5;ctx.strokeStyle=INK;ctx.strokeText(txt,0,0);
      glow(wp.col,12);ctx.fillStyle=CANARY;ctx.fillText(txt,0,0);noGlow();ctx.restore();ctx.textAlign='left';}}
  // popups
  for(const pp of popups){
    ctx.globalAlpha=Math.min(1,pp.life*1.5);
    if(pp.comic){
      ctx.save();ctx.translate(pp.x,pp.y);ctx.rotate(pp.rot);
      ctx.font=`800 ${pp.sz*1.1}px "Outfit",sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.lineWidth=3.5;ctx.strokeStyle=INK;ctx.strokeText(pp.txt,0,0);
      ctx.fillStyle=pp.col;ctx.fillText(pp.txt,0,0);ctx.textBaseline='alphabetic';
      ctx.restore();
    }else{
      ctx.textAlign='center';glow(pp.col,8);ctx.fillStyle=pp.col;ctx.font='700 18px "JetBrains Mono",monospace';ctx.fillText(pp.txt,pp.x,pp.y);noGlow();
    }
  }
  ctx.globalAlpha=1;ctx.textAlign='left';
  if(whiteFlash>0){ctx.globalAlpha=Math.min(0.7,whiteFlash);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  if(crack){const a=Math.max(0,crack.life);ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
    for(const segs of crack.branches){
      ctx.globalAlpha=a*0.9;ctx.strokeStyle=INK;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(crack.x,crack.y);for(const[x,y]of segs)ctx.lineTo(x,y);ctx.stroke();
      ctx.globalAlpha=a;ctx.strokeStyle=crack.col;ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(crack.x,crack.y);for(const[x,y]of segs)ctx.lineTo(x,y);ctx.stroke();
    }
    ctx.globalAlpha=1;ctx.restore();}
  drawHUD();
  if(state==='title'){centerText([
    {txt:'POWER.KLOCK',y:H/2-110,col:'#fff',font:'700 52px "Outfit",sans-serif',glow:MINT},
    {txt:'⚡ V O L L E Y',y:H/2-66,col:CANARY,font:'700 24px "JetBrains Mono",monospace',glow:CANARY},
    {txt:'SOLO vs IA  ·  flèches + espace',y:H/2-22,col:TX3,font:'400 12px "JetBrains Mono",monospace'},
    {txt:'[ 1 ] FACILE     [ 2 ] NORMALE     [ 3 ] DIFFICILE',y:H/2+8,col:MINT,font:'700 18px "JetBrains Mono",monospace'},
    {txt:'[ 4 ] 2 JOUEURS',y:H/2+48,col:CORAL,font:'700 18px "JetBrains Mono",monospace'},
    {txt:'PERFECT = sauver une balle rapide au sol   ·   6 = KLOCK BLAST',y:H/2+92,col:TX3,font:'400 11px "JetBrains Mono",monospace'},
  ]);}
  else if(state==='serve'){ctx.textAlign='center';ctx.fillStyle=players[serveTo].col;ctx.font='700 16px "JetBrains Mono",monospace';glow(players[serveTo].col,12);ctx.fillText(`SERVICE ${players[serveTo].zone}`,W/2,H/2-40);noGlow();ctx.textAlign='left';}
  else if(state==='over'){const wp=players[winner];centerText([
    {txt:`${wp.zone} GAGNE`,y:H/2-20,col:wp.col,font:'700 52px "Outfit",sans-serif',glow:wp.col},
    {txt:`${scoreL} : ${scoreR}   ·   MEILLEUR RALLYE ${maxRally}`,y:H/2+26,col:TX2,font:'400 16px "JetBrains Mono",monospace'},
    {txt:'R POUR REJOUER  ·  1/2/3 IA  ·  4 = 2 JOUEURS',y:H/2+66,col:TX3,font:'400 13px "JetBrains Mono",monospace'},
  ]);}
  requestAnimationFrame(frame);
}

addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if([' ','arrowleft','arrowright','arrowup','arrowdown'].includes(k))e.preventDefault();
  keys[k]=true;audio();
  if(state==='title'||state==='over'){if(k==='1')startGame('solo','easy');else if(k==='2')startGame('solo','normal');else if(k==='3')startGame('solo','hard');else if(k==='4')startGame('duo');}
  if((k==='enter'||k===' ')&&state==='serve')launch();
  if(k==='r'&&(state==='over'||state==='play'))startGame(lastMode,lastLevel);
  if(k==='m')muted=!muted;
});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
(document.fonts?.ready||Promise.resolve()).then(()=>requestAnimationFrame(frame));
setTimeout(()=>{if(t===0)requestAnimationFrame(frame);},600);
</script>
</body>
</html>
