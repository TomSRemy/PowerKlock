<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POWER.KLOCK VOLLEY</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png">
<link rel="shortcut icon" href="../assets/favicon.ico">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
  :root{--mint:#14D3A9;--coral:#ED6965;--canary:#FFFD82;--ink:#011627;--bg:#070b10;--tx2:#B8C9D9;--tx3:#7A93AB;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:radial-gradient(1200px 600px at 50% -10%,#0e1925 0%,transparent 60%),var(--bg);color:#fff;font-family:'Outfit',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:18px;overflow:hidden}
  .wrap{width:min(960px,100%)}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;letter-spacing:.04em}
  .brand .wm{font-weight:700;font-size:18px}
  .brand .wm b{color:var(--canary)}
  .tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:.18em;text-transform:uppercase;border:1px solid #1b2735;border-radius:999px;padding:3px 9px}
  .stage{position:relative;border:1px solid #182433;border-radius:16px;overflow:hidden;box-shadow:0 30px 80px -30px #000,inset 0 0 0 1px #0c141d;background:var(--ink)}
  canvas{display:block;width:100%;height:auto}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3);flex-wrap:wrap;gap:8px}
  .keycap{display:inline-block;border:1px solid #243343;border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--tx2);background:#0d1620;margin:0 1px;font-size:10px}
  .p1{color:var(--mint)}.p2{color:var(--coral)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <img src="../assets/logo-header.png" alt="PowerKlock" style="height:28px;display:block">
      <span class="wm" style="font-size:13px;color:var(--tx3);font-weight:500;letter-spacing:.2em;text-transform:uppercase">Volley</span>
    </div>
    <span class="tag">arcade</span>
  </div>
  <div class="stage"><canvas id="game" width="960" height="540"></canvas></div>
  <div class="foot">
    <span>Solo <span class="keycap">←</span><span class="keycap">→</span><span class="keycap">↑</span>/<span class="keycap">Espace</span></span>
    <span>attrape les bonus en sautant · <span class="keycap">M</span> son · <span class="keycap">R</span> rejouer</span>
    <span>2 joueurs · <span class="p1">FR</span> <span class="keycap">A</span><span class="keycap">D</span><span class="keycap">W</span> · <span class="p2">DE</span> <span class="keycap">←</span><span class="keycap">→</span><span class="keycap">↑</span></span>
  </div>
</div>
<script>
const cv=document.getElementById('game'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
const MINT='#14D3A9',CORAL='#ED6965',CANARY='#FFFD82',INK='#011627',TX2='#B8C9D9',TX3='#7A93AB';

const GROUND=H-92,NET_W=10,NODE_R=9,NET_TOP=GROUND-128,NET_X=W/2;
const R=58,BR=14,GRAV=0.62,GRAV_BALL=0.27,MOVE=7.2,JUMP=15,MAXB=24,WIN_SCORE=7;

const ITEMS=[{id:'smash',col:CORAL,name:'SMASH'},{id:'grow',col:MINT,name:'GROW'},{id:'dash',col:CANARY,name:'DASH'}];
const itemById=id=>ITEMS.find(i=>i.id===id);

let state='title',mode='solo',aiLevel='normal',lastMode='solo',lastLevel='normal';
let scoreL=0,scoreR=0,rally=0,maxRally=0,serveTo='L',countdown=0,winner=null,shake=0,t=0;
const AI_CFG={
  easy:  {interval:11,error:78,jumpChance:0.55,speedMul:0.80,getsItems:false,label:'FACILE'},
  normal:{interval:4, error:36,jumpChance:0.96,speedMul:1.00,getsItems:true, label:'NORMALE'},
  hard:  {interval:2, error:13,jumpChance:0.99,speedMul:1.10,getsItems:true, label:'DIFFICILE'}
};
let aiCfg=AI_CFG.normal;

const keys={};
const players={
  L:{x:W*0.27,y:GROUND,vx:0,vy:0,dir:1,col:MINT,zone:'FR',ai:false,hold:null,rmul:1,growT:0,dashT:0,kLeft:'a',kRight:'d',kJump:'w',kJump2:null},
  R:{x:W*0.73,y:GROUND,vx:0,vy:0,dir:-1,col:CORAL,zone:'DE',ai:true,hold:null,rmul:1,growT:0,dashT:0,kLeft:'arrowleft',kRight:'arrowright',kJump:'arrowup',kJump2:null}
};
const ball={x:W*0.27,y:GROUND-260,vx:0,vy:0,spin:0,ring:0,alive:false,fx:null,hitCd:0};
let trail=[],particles=[],surgeFlash=null,aiTarget=W*0.73,aiTimer=0;
let item=null,itemTimer=150;

// ── audio ──
let actx=null,muted=false;
function audio(){if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function beep(f,d=0.07,type='square',v=0.16){if(muted||!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d);}
const sHit=v=>beep(300+Math.min(v,18)*24,0.06,'square',0.18);
const sWall=()=>beep(180,0.05,'triangle',0.12);
const sNet=()=>beep(130,0.06,'sawtooth',0.12);
const sScore=()=>{beep(420,0.10,'square',0.18);setTimeout(()=>beep(240,0.16,'square',0.18),90);};
const sWin=()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.14,'square',0.2),i*110));
const sSurge=()=>{beep(900,0.05,'square',0.22);setTimeout(()=>beep(1500,0.12,'sawtooth',0.2),45);setTimeout(()=>beep(300,0.14,'square',0.18),60);};
const sItem=()=>{beep(700,0.05,'square',0.16);setTimeout(()=>beep(1050,0.08,'square',0.16),55);};

// ── helpers ──
function spark(x,y,col,n=10,spd=5){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*spd+1;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,col,r:Math.random()*3+1.5});}}
function updateParticles(){for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=0.03;}particles=particles.filter(p=>p.life>0);}
function shade(hex,amt){const n=parseInt(hex.slice(1),16);let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));return`rgb(${r},${g},${b})`;}
function glow(c,b){ctx.shadowColor=c;ctx.shadowBlur=b;}
function noGlow(){ctx.shadowBlur=0;}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function bolt(x1,y1,x2,y2,col,wd){const seg=6,dx=(x2-x1)/seg,dy=(y2-y1)/seg;ctx.strokeStyle=col;ctx.lineWidth=wd;glow(col,16);ctx.beginPath();ctx.moveTo(x1,y1);for(let i=1;i<seg;i++)ctx.lineTo(x1+dx*i+(Math.random()-0.5)*16,y1+dy*i+(Math.random()-0.5)*16);ctx.lineTo(x2,y2);ctx.stroke();noGlow();}
function fxCol(){if(ball.fx?.type==='smash')return CORAL;if(ball.fx?.type==='float')return MINT;if(ball.fx?.type==='curve')return CANARY;return CANARY;}

// ── flow ──
function startGame(m,level){
  mode=m;
  if(m==='solo'){players.L.kLeft='arrowleft';players.L.kRight='arrowright';players.L.kJump='arrowup';players.L.kJump2=' ';players.R.ai=true;if(level){aiLevel=level;aiCfg=AI_CFG[level];}}
  else{players.L.kLeft='a';players.L.kRight='d';players.L.kJump='w';players.L.kJump2=null;players.R.kLeft='arrowleft';players.R.kRight='arrowright';players.R.kJump='arrowup';players.R.kJump2=null;players.R.ai=false;}
  lastMode=m;lastLevel=aiLevel;
  scoreL=scoreR=0;maxRally=0;serveTo='L';players.L.hold=players.R.hold=null;itemTimer=150;serve();
}
function serve(){const s=players[serveTo];ball.x=s.x;ball.y=GROUND-260;ball.vx=0;ball.vy=0;ball.alive=false;ball.fx=null;ball.hitCd=0;for(const k of['L','R']){const p=players[k];p.hold=null;p.growT=0;p.dashT=0;p.rmul=1;}players.L.x=W*0.27;players.R.x=W*0.73;players.L.y=players.R.y=GROUND;players.L.vy=players.R.vy=0;trail=[];rally=0;countdown=85;item=null;state='serve';}
function launch(){ball.alive=true;ball.vy=1;state='play';beep(660,0.05,'square',0.12);}
function scorePoint(side){if(side==='L')scoreL++;else scoreR++;serveTo=side==='L'?'R':'L';maxRally=Math.max(maxRally,rally);shake=14;sScore();spark(ball.x,GROUND,side==='L'?MINT:CORAL,26,7);if(scoreL>=WIN_SCORE||scoreR>=WIN_SCORE){winner=scoreL>scoreR?'L':'R';state='over';setTimeout(sWin,120);}else serve();}
function spawnItem(){const type=ITEMS[Math.floor(Math.random()*ITEMS.length)];item={x:100+Math.random()*(W-200),y:200+Math.random()*100,type,life:520,bob:Math.random()*7};beep(520,0.04,'triangle',0.12);}

// ── AI ──
function predictX(){if(!ball.alive)return W*0.73;let x=ball.x,y=ball.y,vx=ball.vx,vy=ball.vy;for(let i=0;i<320;i++){vy+=GRAV_BALL;x+=vx;y+=vy;if(x<BR){x=BR;vx=-vx*0.9;}if(x>W-BR){x=W-BR;vx=-vx*0.9;}if(y>=GROUND-R*0.6)break;}return x;}
function aiControl(p,mMul,jMul){
  aiTimer--;
  const home=W*0.73;
  if(aiTimer<=0){
    let tgt=home;
    if(ball.alive){
      const coming=ball.x>NET_X||ball.vx>0.3;
      if(coming){const px=predictX();tgt=px>NET_X?px+(Math.random()-0.5)*aiCfg.error:home;}
    }
    if(aiCfg.getsItems&&item&&item.x>NET_X+10&&ball.alive&&ball.x<NET_X-40)tgt=item.x;
    aiTarget=tgt;aiTimer=aiCfg.interval;
  }
  const target=Math.max(NET_X+NET_W/2+R*p.rmul+4,Math.min(W-R*p.rmul-4,aiTarget));
  let mv=0;if(target<p.x-12)mv=-1;else if(target>p.x+12)mv=1;
  p.vx=mv*MOVE*aiCfg.speedMul*mMul;
  const closeBall=Math.abs(ball.x-p.x)<R*1.25,reachBall=ball.y>NET_TOP-20&&ball.y<p.y-R*0.35;
  const closeItem=aiCfg.getsItems&&item&&Math.abs(item.x-p.x)<R*0.9&&item.y>p.y-R-150;
  if(((closeBall&&reachBall&&ball.vy>=-2)||closeItem)&&p.y>=GROUND-0.5&&Math.random()<aiCfg.jumpChance)p.vy=-JUMP*jMul;
}

// ── physics ──
function step(){
  for(const k of['L','R']){
    const p=players[k];
    if(p.growT>0)p.growT--;if(p.dashT>0)p.dashT--;
    p.rmul=p.growT>0?1.4:1;
    const mMul=p.dashT>0?1.5:1,jMul=p.dashT>0?1.12:1,PR=R*p.rmul;
    if(p.ai&&state==='play')aiControl(p,mMul,jMul);
    else{let mv=0;if(keys[p.kLeft])mv-=1;if(keys[p.kRight])mv+=1;p.vx=mv*MOVE*mMul;const jp=keys[p.kJump]||(p.kJump2&&keys[p.kJump2]);if(jp&&p.y>=GROUND-0.5)p.vy=-JUMP*jMul;}
    p.x+=p.vx;p.y+=p.vy;p.vy+=GRAV;
    if(p.y>GROUND){p.y=GROUND;p.vy=0;}
    if(k==='L')p.x=Math.max(PR,Math.min(NET_X-NET_W/2-PR,p.x));else p.x=Math.max(NET_X+NET_W/2+PR,Math.min(W-PR,p.x));
    p.dir=ball.x<p.x?-1:1;
  }
  if(state==='play'){if(!item){itemTimer--;if(itemTimer<=0)spawnItem();}else{
    item.life--;const iy=item.y+Math.sin(t*0.08+item.bob)*6;
    for(const k of['L','R']){const p=players[k];if(Math.hypot(item.x-p.x,iy-p.y)<R*p.rmul+16){const id=item.type.id;if(id==='smash')p.hold='smash';else if(id==='grow')p.growT=420;else if(id==='dash')p.dashT=420;spark(item.x,iy,item.type.col,18,5);sItem();item=null;itemTimer=300+Math.random()*220;break;}}
    if(item&&item.life<=0){item=null;itemTimer=320+Math.random()*220;}
  }}
  if(!ball.alive){ball.x=players[serveTo].x;ball.ring+=0.05;return;}
  if(ball.hitCd>0)ball.hitCd--;
  let g=GRAV_BALL;
  if(ball.fx){if(ball.fx.type==='float')g=0.12;if(ball.fx.type==='curve')ball.vx+=ball.fx.dir;ball.fx.timer--;if(ball.fx.timer<=0)ball.fx=null;}
  ball.vy+=g;
  ball.vx=Math.max(-MAXB,Math.min(MAXB,ball.vx));ball.vy=Math.max(-MAXB,Math.min(MAXB,ball.vy));
  ball.x+=ball.vx;ball.y+=ball.vy;ball.spin+=ball.vx*0.02;ball.ring+=0.18+Math.abs(ball.vx)*0.01;
  trail.push({x:ball.x,y:ball.y,c:fxCol()});if(trail.length>16)trail.shift();
  if(ball.x<BR){ball.x=BR;ball.vx=Math.abs(ball.vx)*0.92;sWall();spark(ball.x,ball.y,CANARY,5,3);}
  if(ball.x>W-BR){ball.x=W-BR;ball.vx=-Math.abs(ball.vx)*0.92;sWall();spark(ball.x,ball.y,CANARY,5,3);}
  if(ball.y<BR){ball.y=BR;ball.vy=Math.abs(ball.vy)*0.9;}
  // net: node (top) + pole (below)
  const nodeY=NET_TOP+8;
  {const dx=ball.x-NET_X,dy=ball.y-nodeY,d=Math.hypot(dx,dy)||1;if(d<BR+NODE_R){const nx=dx/d,ny=dy/d,dot=ball.vx*nx+ball.vy*ny;if(dot<0){ball.vx-=2*dot*nx;ball.vy-=2*dot*ny;}ball.x=NET_X+nx*(BR+NODE_R);ball.y=nodeY+ny*(BR+NODE_R);sNet();}}
  if(ball.y>nodeY&&Math.abs(ball.x-NET_X)<NET_W/2+BR){if(ball.x<NET_X){ball.x=NET_X-NET_W/2-BR;ball.vx=-Math.abs(ball.vx)*0.9;}else{ball.x=NET_X+NET_W/2+BR;ball.vx=Math.abs(ball.vx)*0.9;}sNet();}
  // slimes
  for(const k of['L','R']){
    const p=players[k];const PR=R*p.rmul,dx=ball.x-p.x,dy=ball.y-p.y,d=Math.hypot(dx,dy)||1;
    if(d<PR+BR&&dy<6&&ball.hitCd<=0){
      const nx=dx/d,ny=dy/d;ball.x=p.x+nx*(PR+BR);ball.y=p.y+ny*(PR+BR);
      const toOpp=(k==='L')?1:-1;
      let speed=Math.min(Math.max(Math.hypot(ball.vx,ball.vy),11),16);
      const hold=p.hold;rally++;ball.hitCd=6;
      if(hold==='smash'){
        p.hold=null;ball.vx=toOpp*MAXB*0.95;ball.vy=-3;ball.fx={type:'smash',timer:26};
        surgeFlash={x1:p.x,y1:p.y-PR,x2:ball.x,y2:ball.y,life:1,col:p.col};sSurge();shake=18;spark(ball.x,ball.y,CANARY,24,9);spark(ball.x,ball.y,CORAL,12,6);
      }else{
        ball.vx=nx*speed+p.vx*0.4;ball.vy=ny*speed-1.5;
        sHit(speed);spark(ball.x,ball.y,p.col,12,5);shake=Math.min(7,3+speed*0.12);
      }
    }
  }
  if(ball.y+BR>=GROUND){ball.y=GROUND-BR;spark(ball.x,GROUND,ball.x<NET_X?CORAL:MINT,18,5);scorePoint(ball.x<NET_X?'R':'L');}
}

// ── draw ──
function drawBackground(){
  ctx.fillStyle=INK;ctx.fillRect(0,0,W,H);
  const g=ctx.createRadialGradient(W/2,H*0.1,40,W/2,H*0.1,W*0.8);g.addColorStop(0,'rgba(20,211,169,0.06)');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(46,72,96,0.16)';ctx.lineWidth=1;
  for(let x=0;x<=W;x+=48){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GROUND);ctx.stroke();}
  for(let y=0;y<=GROUND;y+=48){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.strokeStyle='rgba(20,211,169,0.16)';ctx.lineWidth=2;ctx.beginPath();
  for(let x=0;x<=W;x+=8){const y=150+Math.sin(x*0.012+t*0.01)*26+Math.sin(x*0.045+t*0.02)*10;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();
  ctx.fillStyle='#0b141d';ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.fillStyle='#0e1a24';ctx.fillRect(0,GROUND,W,5);
  ctx.strokeStyle=MINT;ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();
  ctx.strokeStyle='rgba(20,211,169,0.12)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,GROUND+14);ctx.lineTo(W,GROUND+14);ctx.stroke();
  // net — pole + node
  const top=NET_TOP,nodeY=top+8;
  ctx.fillStyle='#16242f';rr(NET_X-3,nodeY,6,GROUND-nodeY,3);ctx.fill();
  ctx.strokeStyle=MINT;ctx.lineWidth=2;ctx.beginPath();ctx.arc(NET_X,nodeY,NODE_R+6,0,7);ctx.stroke();
  glow(CANARY,16+Math.sin(t*0.1)*6);ctx.fillStyle=CANARY;ctx.beginPath();ctx.arc(NET_X,nodeY,NODE_R,0,7);ctx.fill();noGlow();
}

function drawSlime(p){
  const PR=R*p.rmul;
  ctx.fillStyle='rgba(0,0,0,0.30)';ctx.beginPath();ctx.ellipse(p.x,GROUND+5,PR*0.78,8,0,0,7);ctx.fill();
  let aura=p.hold?itemById(p.hold).col:(p.growT>0?MINT:(p.dashT>0?CANARY:null));
  if(aura){glow(aura,18);ctx.strokeStyle=aura;ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,PR+7+Math.sin(t*0.3)*2,Math.PI,0);ctx.stroke();noGlow();}
  ctx.fillStyle='#0c141d';ctx.beginPath();ctx.arc(p.x,p.y,PR,Math.PI,0);ctx.closePath();ctx.fill();
  glow(p.col,9);ctx.strokeStyle=p.col;ctx.lineWidth=3.5;ctx.lineCap='round';ctx.beginPath();ctx.arc(p.x,p.y,PR-1.8,Math.PI,0);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x-PR+1.8,p.y);ctx.lineTo(p.x+PR-1.8,p.y);ctx.stroke();noGlow();
  // small eye (original style) that follows the ball
  const ex=p.x+p.dir*PR*0.32,ey=p.y-PR*0.46,eR=PR*0.18;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,ey,eR,0,7);ctx.fill();
  const dx=ball.x-ex,dy=ball.y-ey,d=Math.hypot(dx,dy)||1,off=eR*0.45;
  ctx.fillStyle=INK;ctx.beginPath();ctx.arc(ex+dx/d*off,ey+dy/d*off,eR*0.55,0,7);ctx.fill();
}

function drawGlyph(id,x,y,c){
  ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  if(id==='smash'){ctx.beginPath();ctx.moveTo(x+4,y-9);ctx.lineTo(x-5,y+1);ctx.lineTo(x-1,y+1);ctx.lineTo(x-4,y+9);ctx.lineTo(x+5,y-2);ctx.lineTo(x+1,y-2);ctx.closePath();ctx.fill();}
  else if(id==='grow'){ctx.beginPath();ctx.moveTo(x-8,y+8);ctx.lineTo(x+8,y-8);ctx.stroke();ctx.beginPath();ctx.moveTo(x+8,y-8);ctx.lineTo(x+2,y-8);ctx.moveTo(x+8,y-8);ctx.lineTo(x+8,y-2);ctx.moveTo(x-8,y+8);ctx.lineTo(x-2,y+8);ctx.moveTo(x-8,y+8);ctx.lineTo(x-8,y+2);ctx.stroke();}
  else if(id==='dash'){for(let i=0;i<2;i++){const ox=x-4+i*9;ctx.beginPath();ctx.moveTo(ox-3,y-8);ctx.lineTo(ox+5,y);ctx.lineTo(ox-3,y+8);ctx.stroke();}}
}
function drawItem(){
  if(!item)return;
  const y=item.y+Math.sin(t*0.08+item.bob)*6,c=item.type.col,fade=item.life<60?item.life/60:1;
  ctx.globalAlpha=fade;glow(c,16);ctx.fillStyle='rgba(7,11,16,0.88)';rr(item.x-18,y-18,36,36,9);ctx.fill();
  ctx.strokeStyle=c;ctx.lineWidth=2.5;rr(item.x-18,y-18,36,36,9);ctx.stroke();noGlow();drawGlyph(item.type.id,item.x,y,c);ctx.globalAlpha=1;
}

function drawBall(){
  const col=fxCol();
  for(let i=0;i<trail.length;i++){const a=i/trail.length,tc=trail[i].c;ctx.fillStyle=tc===MINT?`rgba(20,211,169,${a*0.45})`:tc===CORAL?`rgba(237,105,101,${a*0.5})`:`rgba(255,253,130,${a*0.4})`;ctx.beginPath();ctx.arc(trail[i].x,trail[i].y,BR*a*0.85,0,7);ctx.fill();}
  if(ball.alive){const arcs=ball.fx?3:2;for(let i=0;i<arcs;i++){const a=Math.random()*7,r1=BR+2,r2=BR+9+Math.random()*6;bolt(ball.x+Math.cos(a)*r1,ball.y+Math.sin(a)*r1,ball.x+Math.cos(a)*r2,ball.y+Math.sin(a)*r2,col,1.4);}}
  ctx.save();ctx.translate(ball.x,ball.y);ctx.rotate(ball.ring);glow(col,12);ctx.strokeStyle=col;ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.arc(0,0,BR+7,0.5,0.5+Math.PI*1.5);ctx.stroke();noGlow();ctx.restore();
  glow(CANARY,16);ctx.fillStyle=CANARY;ctx.beginPath();ctx.arc(ball.x,ball.y,BR,0,7);ctx.fill();noGlow();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,BR*0.4,0,7);ctx.fill();
}

function drawHold(p,alignR){
  const y=H-20;ctx.font='700 11px "JetBrains Mono",monospace';
  let col=null,label=null;
  if(p.hold){col=itemById(p.hold).col;label=itemById(p.hold).name;}
  else if(p.growT>0){col=MINT;label='GROW';}
  else if(p.dashT>0){col=CANARY;label='DASH';}
  if(col){glow(col,10);ctx.fillStyle=col;
    if(alignR){ctx.fillRect(W-30,y-11,12,12);noGlow();ctx.textAlign='right';ctx.fillText(`${label} :${p.zone}`,W-36,y);}
    else{ctx.fillRect(18,y-11,12,12);noGlow();ctx.textAlign='left';ctx.fillText(`${p.zone}: ${label}`,36,y);}
  }else{ctx.fillStyle=TX3;if(alignR){ctx.textAlign='right';ctx.fillText(`— :${p.zone}`,W-18,y);}else{ctx.textAlign='left';ctx.fillText(`${p.zone}: —`,18,y);}}
  ctx.textAlign='left';
}
function drawHUD(){
  ctx.font='700 46px "JetBrains Mono",monospace';ctx.textAlign='center';
  glow(MINT,10);ctx.fillStyle=MINT;ctx.fillText(scoreL,W/2-70,56);noGlow();
  ctx.fillStyle=TX3;ctx.font='700 30px "JetBrains Mono",monospace';ctx.fillText(':',W/2,52);
  glow(CORAL,10);ctx.fillStyle=CORAL;ctx.font='700 46px "JetBrains Mono",monospace';ctx.fillText(scoreR,W/2+70,56);noGlow();
  ctx.font='400 12px "JetBrains Mono",monospace';ctx.fillStyle=TX3;ctx.fillText(`RALLY ${rally}`,W/2,78);
  ctx.textAlign='right';ctx.fillText(`MAX ${maxRally}`,W-14,22);ctx.textAlign='left';
  if(mode==='solo'){ctx.fillStyle=TX3;ctx.font='400 11px "JetBrains Mono",monospace';ctx.fillText(`IA ${aiCfg.label}`,14,22);}
  if(scoreL===WIN_SCORE-1||scoreR===WIN_SCORE-1){ctx.textAlign='center';ctx.fillStyle=CANARY;ctx.font='700 12px "JetBrains Mono",monospace';ctx.fillText('⚡ MATCH POINT',W/2,96);ctx.textAlign='left';}
  drawHold(players.L,false);drawHold(players.R,true);
}
function centerText(lines){ctx.fillStyle='rgba(2,8,14,0.82)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';for(const l of lines){glow(l.glow||'transparent',l.glow?16:0);ctx.fillStyle=l.col;ctx.font=l.font;ctx.fillText(l.txt,W/2,l.y);noGlow();}ctx.textAlign='left';}

function frame(){
  t++;
  if(state==='play')step();
  else if(state==='serve'){countdown--;ball.x=players[serveTo].x;ball.ring+=0.05;if(countdown<=0)launch();step();}
  updateParticles();
  if(surgeFlash){surgeFlash.life-=0.12;if(surgeFlash.life<=0)surgeFlash=null;}
  if(shake>0)shake*=0.86;
  ctx.save();
  if(shake>0.4)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  drawBackground();drawItem();drawSlime(players.L);drawSlime(players.R);
  if(surgeFlash){ctx.globalAlpha=surgeFlash.life;bolt(surgeFlash.x1,surgeFlash.y1,surgeFlash.x2,surgeFlash.y2,surgeFlash.col,4);bolt(surgeFlash.x1,surgeFlash.y1,surgeFlash.x2,surgeFlash.y2,CANARY,2);ctx.globalAlpha=1;}
  drawBall();
  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}ctx.globalAlpha=1;
  ctx.restore();
  drawHUD();
  if(state==='title'){centerText([
    {txt:'POWER.KLOCK',y:H/2-110,col:'#fff',font:'700 52px "Outfit",sans-serif',glow:MINT},
    {txt:'⚡ V O L L E Y',y:H/2-66,col:CANARY,font:'700 24px "JetBrains Mono",monospace',glow:CANARY},
    {txt:'SOLO vs IA  ·  flèches + espace',y:H/2-22,col:TX3,font:'400 12px "JetBrains Mono",monospace'},
    {txt:'[ 1 ] FACILE     [ 2 ] NORMALE     [ 3 ] DIFFICILE',y:H/2+8,col:MINT,font:'700 18px "JetBrains Mono",monospace'},
    {txt:'[ 4 ] 2 JOUEURS',y:H/2+48,col:CORAL,font:'700 18px "JetBrains Mono",monospace'},
    {txt:'bonus à attraper en l\'air : SMASH · GROW · DASH',y:H/2+92,col:TX3,font:'400 13px "JetBrains Mono",monospace'},
  ]);}
  else if(state==='serve'){ctx.textAlign='center';ctx.fillStyle=players[serveTo].col;ctx.font='700 16px "JetBrains Mono",monospace';glow(players[serveTo].col,12);ctx.fillText(`SERVICE ${players[serveTo].zone}`,W/2,H/2-40);noGlow();ctx.textAlign='left';}
  else if(state==='over'){const wp=players[winner];centerText([
    {txt:`${wp.zone} GAGNE`,y:H/2-20,col:wp.col,font:'700 52px "Outfit",sans-serif',glow:wp.col},
    {txt:`${scoreL} : ${scoreR}   ·   MEILLEUR RALLYE ${maxRally}`,y:H/2+26,col:TX2,font:'400 16px "JetBrains Mono",monospace'},
    {txt:'R POUR REJOUER  ·  1/2/3 IA  ·  4 = 2 JOUEURS',y:H/2+66,col:TX3,font:'400 13px "JetBrains Mono",monospace'},
  ]);}
  requestAnimationFrame(frame);
}

addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if([' ','arrowleft','arrowright','arrowup','arrowdown'].includes(k))e.preventDefault();
  keys[k]=true;audio();
  if(state==='title'||state==='over'){if(k==='1')startGame('solo','easy');else if(k==='2')startGame('solo','normal');else if(k==='3')startGame('solo','hard');else if(k==='4')startGame('duo');}
  if((k==='enter'||k===' ')&&state==='serve')launch();
  if(k==='r'&&(state==='over'||state==='play'))startGame(lastMode,lastLevel);
  if(k==='m')muted=!muted;
});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
(document.fonts?.ready||Promise.resolve()).then(()=>requestAnimationFrame(frame));
setTimeout(()=>{if(t===0)requestAnimationFrame(frame);},600);
</script>
</body>
</html>
